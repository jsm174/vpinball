[configuration]
id = "WebDisplay"
name = "Web Display"
description = "Streams display data to a web browser on port 4000"
author = "VPX dev team"
version = "1.0"
link = "https://github.com/vpinball/vpinball"

[libraries]
windows.x86 = "plugin-webdisplay.dll"
windows.x64 = "plugin-webdisplay64.dll"
linux.x64 = "plugin-webdisplay.so"
linux.aarch64 = "plugin-webdisplay.so"
macos.x64 = "plugin-webdisplay.dylib"
macos.arm64 = "plugin-webdisplay.dylib"
