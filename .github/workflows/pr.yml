name: PR build

# Minimal continuous integration for pull requests: build a representative
# configuration on each platform so a broken build (or a platform specific
# compile error/warning) is caught before merge.
#
# Cost control (see discussion on enabling PR CI):
# - One representative config per platform (BGFX Release), not the full matrix.
# - The external dependency cache is restored READ-ONLY (no save step), so PR
#   runs can never evict the cache that the push-to-master builds populate.
# - Concurrent runs on the same PR are cancelled.
# - No code signing, notarization, secrets or artifact upload.
on:
  pull_request:

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VERSION_START_SHA: ea558e7417f6f06fe567d34f0e33792a141b8e64

defaults:
  run:
    shell: bash

jobs:
  version:
    name: Version
    runs-on: ubuntu-24.04
    outputs:
      revision: ${{ steps.version.outputs.revision }}
      version_short: ${{ steps.version.outputs.version_short }}
      version_full: ${{ steps.version.outputs.version_full }}
      version_ios: ${{ steps.version.outputs.version_ios }}
      sha7: ${{ steps.version.outputs.sha7 }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: version
        run: |
          REVISION=$(git rev-list ${{ env.VERSION_START_SHA }}..HEAD --count)
          VERSION_MAJOR=$(grep -Eo "VP_VERSION_MAJOR\s+[0-9]+" src/core/vpversion.h | grep -Eo "[0-9]+")
          VERSION_MINOR=$(grep -Eo "VP_VERSION_MINOR\s+[0-9]+" src/core/vpversion.h | grep -Eo "[0-9]+")
          VERSION_REV=$(grep -Eo "VP_VERSION_REV\s+[0-9]+" src/core/vpversion.h | grep -Eo "[0-9]+")
          VERSION_NUMERIC=$((VERSION_MAJOR * 10000 + VERSION_MINOR * 100 + VERSION_REV))
          VERSION_SHORT="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REV}"
          VERSION_FULL="${VERSION_SHORT}.${REVISION}"
          VERSION_IOS="${VERSION_NUMERIC}.0.${REVISION}"
          SHA7="${GITHUB_SHA::7}"
          TAG="${VERSION_SHORT}-${REVISION}-${SHA7}"
          echo "revision=${REVISION}" >> $GITHUB_OUTPUT
          echo "version_short=${VERSION_SHORT}" >> $GITHUB_OUTPUT
          echo "version_full=${VERSION_FULL}" >> $GITHUB_OUTPUT
          echo "version_ios=${VERSION_IOS}" >> $GITHUB_OUTPUT
          echo "sha7=${SHA7}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  build:
    name: Build VPinballX_BGFX-${{ matrix.platform }}-${{ matrix.arch }}-Release
    runs-on: ${{ matrix.os }}
    needs: [ version ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, platform: linux, arch: x64 }
          - { os: macos-15, platform: macos, arch: arm64 }
          - { os: windows-2025-vs2026, platform: windows, arch: x64 }
    env:
      config: Release
    steps:
      - if: (matrix.platform == 'windows')
        uses: microsoft/setup-msbuild@v3
      - if: (matrix.platform == 'windows')
        run: |
          /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm make diffutils yasm bison git autoconf automake libtool"
          /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-zlib mingw-w64-ucrt-x86_64-libwinpthread mingw-w64-ucrt-x86_64-libiconv mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-tools"
      - if: (matrix.platform == 'macos')
        run: |
          brew install bison autoconf automake libtool nasm
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
      - if: (matrix.platform == 'linux')
        run: |
          sudo apt-get update
          sudo apt install cmake nasm bison zlib1g-dev libdrm-dev libgbm-dev libglu1-mesa-dev libegl-dev libgl1-mesa-dev libwayland-dev libwayland-egl-backend-dev libudev-dev libx11-dev libxcursor-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libxrandr-dev libasound2-dev libpipewire-0.3-dev
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache (read-only)
        uses: actions/cache/restore@v5
        with:
          path: external
          key: ${{ matrix.platform }}-${{ matrix.arch }}-${{ env.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.arch }}-${{ env.config }}-external-
      - name: Build external dependencies
        run: |
          BUILD_TYPE=${{ env.config }} ./platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha7 }}/g" src/core/git_version.h
      - name: Build
        run: |
          cp make/CMakeLists_bgfx-${{ matrix.platform }}-${{ matrix.arch }}.txt CMakeLists.txt
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            cmake -G "Visual Studio 18 2026" -A x64 -B build
            cmake --build build --config ${{ env.config }}
          elif [[ "${{ matrix.platform }}" == "macos" ]]; then
            cmake -DCMAKE_BUILD_TYPE=${{ env.config }} -B build/${{ env.config }}
            cmake --build build/${{ env.config }} -- -j$(sysctl -n hw.ncpu)
          else
            cmake -DCMAKE_BUILD_TYPE=${{ env.config }} -B build/${{ env.config }}
            cmake --build build/${{ env.config }} -- -j$(nproc)
          fi

  build-mingw:
    name: Build VPinballX_BGFX-windows-mingw-x64-Release
    runs-on: windows-2025-vs2026
    needs: [ version ]
    env:
      config: Release
    steps:
      - uses: microsoft/setup-msbuild@v3
      - run: |
          /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm make diffutils yasm bison git autoconf automake libtool"
          /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-zlib mingw-w64-ucrt-x86_64-libwinpthread mingw-w64-ucrt-x86_64-libiconv mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-tools"
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/windows-mingw-x64/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache (read-only)
        uses: actions/cache/restore@v5
        with:
          path: external
          key: windows-mingw-x64-${{ env.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            windows-mingw-x64-${{ env.config }}-external-
      - name: Build external dependencies
        run: |
          CURRENT_DIR="$(pwd)"
          MSYSTEM=UCRT64 /c/msys64/usr/bin/bash.exe -l -c "
            cd \"${CURRENT_DIR}\" &&
            BUILD_TYPE=${{ env.config }} ./platforms/windows-mingw-x64/external.sh
          "
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha7 }}/g" src/core/git_version.h
      - name: Build
        run: |
          cp make/CMakeLists_bgfx-windows-mingw-x64.txt CMakeLists.txt
          CURRENT_DIR="$(pwd)"
          MSYSTEM=UCRT64 /c/msys64/usr/bin/bash.exe -l -c "
            cd \"${CURRENT_DIR}\" &&
            cmake -DCMAKE_BUILD_TYPE=${{ env.config }} -B build/${{ env.config }} &&
            cmake --build build/${{ env.config }} -- -j\$(nproc)
          "

  build-arm64:
    name: Build VPinballX_BGFX-linux-aarch64-Release
    runs-on: ubuntu-24.04-arm
    needs: [ version ]
    env:
      config: Release
    steps:
      - run: |
          sudo apt-get update
          sudo apt install cmake nasm bison zlib1g-dev libdrm-dev libgbm-dev libglu1-mesa-dev libegl-dev libgl1-mesa-dev libwayland-dev libwayland-egl-backend-dev libudev-dev libx11-dev libxcursor-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libxrandr-dev libasound2-dev libpipewire-0.3-dev
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/linux-aarch64/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache (read-only)
        uses: actions/cache/restore@v5
        with:
          path: external
          key: sbc-linux-aarch64-${{ env.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            sbc-linux-aarch64-${{ env.config }}-external-
      - name: Build external dependencies
        run: |
          BUILD_TYPE=${{ env.config }} ./platforms/linux-aarch64/external.sh
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha7 }}/g" src/core/git_version.h
      - name: Build
        run: |
          cp make/CMakeLists_bgfx-linux-aarch64.txt CMakeLists.txt
          cmake -DCMAKE_BUILD_TYPE=${{ env.config }} -B build/${{ env.config }}
          cmake --build build/${{ env.config }} -- -j$(nproc)

  build-ios:
    name: Build VPinballX_BGFX-ios-Release
    runs-on: macos-15
    needs: [ version ]
    env:
      config: Release
    steps:
      - run: |
          brew install bison autoconf automake libtool ldid
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/ios-arm64/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache (read-only)
        uses: actions/cache/restore@v5
        with:
          path: external
          key: ios-arm64-${{ env.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            ios-arm64-${{ env.config }}-external-
      - name: Build external dependencies
        run: |
          BUILD_TYPE=${{ env.config }} ./platforms/ios-arm64/external.sh
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha7 }}/g" src/core/git_version.h
      - name: Build libvpinball
        run: |
          cp make/CMakeLists_bgfx_lib.txt CMakeLists.txt
          cmake -DPLATFORM=ios -DARCH=arm64 -DCMAKE_BUILD_TYPE=${{ env.config }} -B build/ios-arm64
          cmake --build build/ios-arm64 -- -j$(sysctl -n hw.ncpu)
      - name: Build app (unsigned ipa)
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.2.app
          MARKETING_VERSION="${{ needs.version.outputs.version_ios }}"
          CURRENT_PROJECT_VERSION="${{ needs.version.outputs.version_full }}"
          cd standalone/ios
          perl -i -pe "s/MARKETING_VERSION = [0-9.]+/MARKETING_VERSION = $MARKETING_VERSION/g" "VPinball.xcodeproj/project.pbxproj"
          perl -i -pe "s/CURRENT_PROJECT_VERSION = [0-9.]+/CURRENT_PROJECT_VERSION = $CURRENT_PROJECT_VERSION/g" "VPinball.xcodeproj/project.pbxproj"
          fastlane build_unsigned_ipa

  build-android:
    name: Build VPinballX_BGFX-android-mobile-Release
    runs-on: ubuntu-24.04
    needs: [ version ]
    env:
      config: Release
      ANDROID_NDK: /usr/local/lib/android/sdk/ndk/28.2.13676358
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/28.2.13676358
      ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/28.2.13676358
    steps:
      - run: |
          sudo apt install bison
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/android-arm64-v8a/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache (read-only)
        uses: actions/cache/restore@v5
        with:
          path: external
          key: android-arm64-v8a-${{ env.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            android-arm64-v8a-${{ env.config }}-external-
      - name: Build external dependencies
        run: |
          BUILD_TYPE=${{ env.config }} ./platforms/android-arm64-v8a/external.sh
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha7 }}/g" src/core/git_version.h
      - name: Build libvpinball
        run: |
          cp make/CMakeLists_bgfx_lib.txt CMakeLists.txt
          cmake -DPLATFORM=android -DARCH=arm64-v8a -DCMAKE_BUILD_TYPE=${{ env.config }} -B build/android-arm64-v8a
          cmake --build build/android-arm64-v8a -- -j$(nproc)
      - name: Build app (apk + aab, throwaway keystore)
        run: |
          export ANDROID_KEYSTORE_PASSWORD=vpinball
          export ANDROID_KEY_ALIAS=vpinball
          export ANDROID_KEY_PASSWORD=vpinball
          cd standalone/android
          keytool -genkey -v -keystore app/vpinball.jks \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -storepass "$ANDROID_KEYSTORE_PASSWORD" \
                -keypass "$ANDROID_KEY_PASSWORD" \
                -alias "$ANDROID_KEY_ALIAS" \
                -dname "CN=VPinball Android, O=VPinball, C=XX"
          ./gradlew \
            assembleMobile${{ env.config }} \
            bundleMobile${{ env.config }} \
            -PversionName="${{ needs.version.outputs.version_full }}" \
            -Psha7="${{ needs.version.outputs.sha7 }}"
